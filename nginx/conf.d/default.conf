# =========================================================
# Wefluence API - HTTP only (SSL ditangani Cloudflare)
# Cloudflare proxy ON, SSL/TLS mode: Flexible
# =========================================================

map_hash_bucket_size 128;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Log format: catat IP, origin domain, endpoint, status, user-agent
log_format scraper_log '$time_iso8601 | $remote_addr | origin="$http_origin" | '
                       '"$request" | $status | ua="$http_user_agent"';

upstream caption_scraper_backend {
    server caption-scraper:8000;
    keepalive 32;
}

upstream matrix_scrapper_backend {
    server matrix-scrapper:8000;
    keepalive 32;
}

upstream ai_support_backend {
    server ai-support:8000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Allowed CORS origins (regex match all localhost ports)
map $http_origin $cors_origin {
    default                     "";
    "~^http://localhost(:\d+)?$"  $http_origin;
    "~^http://127\.0\.0\.1(:\d+)?$" $http_origin;
    "https://wefluence.app"     "https://wefluence.app";
    "https://www.wefluence.app" "https://www.wefluence.app";
}

# API key validation
map $http_x_api_key $api_key_valid {
    default                                                              0;
    "0d0dcce524406f1ce5a941fc263fc7246afea8273fd835f825321e2d19ee69de"   1;
}

server {
    listen 80 default_server;
    server_name api.wefluence.app _;

    access_log /var/log/nginx/scraper_access.log scraper_log;
    error_log  /var/log/nginx/scraper_error.log warn;

    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain;

    # Trust Cloudflare's X-Forwarded-For
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    location = / {
        return 404;
    }

    location /ai/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        if ($api_key_valid = 0) {
            return 403;
        }

        limit_req zone=api_limit burst=60 nodelay;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $cors_origin always;

        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://ai_support_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /caption/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        if ($api_key_valid = 0) {
            return 403;
        }

        limit_req zone=api_limit burst=60 nodelay;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $cors_origin always;

        rewrite ^/caption/(.*)$ /$1 break;
        proxy_pass http://caption_scraper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Bumped from 60s to 90s — caption scraper has its own internal budgets
        # but slow upstream platforms (FB / TT short-URL resolution) can still
        # push individual requests close to the old limit, producing 504 + the
        # apparent "CORS error" in the browser when the error page lacks headers.
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location /matrix/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        if ($api_key_valid = 0) {
            return 403;
        }

        limit_req zone=api_limit burst=60 nodelay;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $cors_origin always;

        rewrite ^/matrix/(.*)$ /$1 break;
        proxy_pass http://matrix_scrapper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}
